# Self-hosting the portfolio with SQLite.
# The DB is a single file and media are stored on disk, so both live on
# named volumes to survive container restarts and redeploys.

services:
  web:
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    ports:
      - '3000:3000'
    environment:
      # DB file lives on the persistent volume mounted at /data.
      DATABASE_URL: file:/data/portfolio.db
      PAYLOAD_SECRET: ${PAYLOAD_SECRET}
      NEXT_PUBLIC_SERVER_URL: ${NEXT_PUBLIC_SERVER_URL}
    volumes:
      - db:/data
      - media:/app/media

volumes:
  db:
  media:
